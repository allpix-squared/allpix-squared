#DESC test assignment of bunch crossing IDs to timestamps in the PixESL writer module
[Allpix]
detectors_file = "detector.conf"
number_of_events = 5
random_seed = 0

[DepositionPointCharge]
model = "fixed"
source_type = "point"
position = 445um 220um 0um
number_of_charges = 200

[ElectricFieldReader]
model = "linear"
bias_voltage = 100V
depletion_voltage = 150V

[GenericPropagation]
temperature = 293K
charge_per_step = 1
propagate_electrons = false
propagate_holes = true

[SimpleTransfer]

[DefaultDigitizer]
threshold = 0e

[PixESLWriter]
log_level = TRACE
bx_period = 25ns
# Use a rate of 100 MHz/cm2
mean_hit_rate = 100/us/cm/cm
file_name = "test"
output_plots = true

#PASS (Event 5) [R:PixESLWriter:mydetector] BX 51
